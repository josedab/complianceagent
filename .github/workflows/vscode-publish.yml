name: Publish VS Code Extension

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (package only, do not publish)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

defaults:
  run:
    working-directory: ide-extension/vscode

jobs:
  build-and-publish:
    name: Build & Publish Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ide-extension/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --out complianceagent.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: complianceagent-vsix
          path: ide-extension/vscode/complianceagent.vsix

      - name: Publish to VS Code Marketplace
        if: >
          github.event_name == 'push' && startsWith(github.ref, 'refs/tags/vscode-v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        run: npx @vscode/vsce publish --packagePath complianceagent.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: >
          github.event_name == 'push' && startsWith(github.ref, 'refs/tags/vscode-v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        run: npx ovsx publish complianceagent.vsix -p $OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true
